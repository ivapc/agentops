pre-commit:
  parallel: true
  commands:
    biome:
      glob: '*.{js,jsx,ts,tsx,json,jsonc,css}'
      # `git update-index --again` re-stages only entries already in the index
      # — never untracked or unstaged-only files. `stage_fixed: true` here was
      # pulling in working-tree-modified files outside {staged_files}.
      run: ./node_modules/.bin/biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files} && git update-index --again

commit-msg:
  commands:
    commitlint:
      run: ./node_modules/.bin/commitlint --edit {1}
